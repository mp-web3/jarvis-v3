audio:
  sample_rate: 16000
  channels: 1

stt:
  # OpenAI Realtime API model for transcription
  model: "gpt-4o-transcribe"

tts:
  # OpenAI TTS model: tts-1 (fast) or tts-1-hd (higher quality)
  model: "tts-1"
  # OpenAI voice: alloy, echo, fable, onyx, nova, shimmer
  voice: "nova"
  sample_rate: 24000

listener:
  input_device: "MacBook Air Microphone"
  output_device: "AirPods"
  chunk_ms: 30
  ring_buffer_ms: 800
  # Server-side VAD settings (OpenAI Realtime API)
  vad_threshold: 0.5
  silence_ms: 500
  min_speech_s: 0.4
  debounce_ms: 300
  bargein_enabled: true
  bargein_sustain_ms: 400
  min_utterance_energy: 0.0005

web:
  host: "0.0.0.0"
  port: 8000

jarvis:
  tmux_target: "claude:0"
